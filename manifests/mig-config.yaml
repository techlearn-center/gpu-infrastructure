# Multi-Instance GPU (MIG) Configuration
# MIG partitions a single NVIDIA A100/A30/H100 into up to 7 isolated
# GPU instances, each with dedicated compute, memory, and cache.
#
# Supported GPUs:
#   - A100 (40 GB / 80 GB)  - up to 7 instances
#   - A30  (24 GB)           - up to 4 instances
#   - H100 (80 GB)           - up to 7 instances
#
# MIG Profiles (A100-80GB):
#   Profile    | SM | Memory | Max instances
#   1g.10gb    |  1 | 10 GB  | 7
#   2g.20gb    |  2 | 20 GB  | 3
#   3g.40gb    |  3 | 40 GB  | 2
#   4g.40gb    |  4 | 40 GB  | 1
#   7g.80gb    |  7 | 80 GB  | 1  (full GPU)
#
# MIG Strategies:
#   - "single"  All instances on a GPU are the same profile.
#               Resource: nvidia.com/gpu (each instance = 1 GPU)
#   - "mixed"   Different profiles on the same GPU.
#               Resource: nvidia.com/mig-<profile>
#
# Usage:
#   kubectl apply -f manifests/mig-config.yaml
# -------------------------------------------------------------------

---
# ConfigMap for the MIG Manager component of the GPU Operator
apiVersion: v1
kind: ConfigMap
metadata:
  name: mig-config
  namespace: gpu-operator
  labels:
    app.kubernetes.io/part-of: gpu-operator
    app.kubernetes.io/component: mig-manager
data:
  # ---- Profile: all-1g.10gb ------------------------------------------
  # Partition every A100 into 7x 1g.10gb instances.
  # Best for: lightweight inference, notebooks, CI/CD GPU tests.
  config.yaml: |
    version: v1
    mig-configs:
      # 7 small instances per A100-80GB
      all-1g.10gb:
        - devices: all
          mig-enabled: true
          mig-devices:
            "1g.10gb": 7

      # 3 medium instances per A100-80GB
      all-2g.20gb:
        - devices: all
          mig-enabled: true
          mig-devices:
            "2g.20gb": 3

      # 2 large instances per A100-80GB
      all-3g.40gb:
        - devices: all
          mig-enabled: true
          mig-devices:
            "3g.40gb": 2

      # Mixed: 1 large + 2 small (development cluster)
      mixed-dev:
        - devices: all
          mig-enabled: true
          mig-devices:
            "3g.40gb": 1
            "2g.20gb": 1
            "1g.10gb": 2

      # Mixed: production inference cluster
      mixed-inference:
        - devices: all
          mig-enabled: true
          mig-devices:
            "2g.20gb": 2
            "1g.10gb": 3

      # Full GPU (disable MIG partitioning)
      full-gpu:
        - devices: all
          mig-enabled: false
          mig-devices: {}

---
# Node labels control which MIG profile is applied.
# Apply a profile:
#   kubectl label node <node-name> nvidia.com/mig.config=all-1g.10gb --overwrite
#
# The MIG Manager watches for label changes and reconfigures GPUs
# automatically (pods are drained first).

---
# Example: Pod requesting a specific MIG instance (mixed strategy)
apiVersion: v1
kind: Pod
metadata:
  name: mig-inference-small
  namespace: default
  labels:
    app: mig-test
spec:
  restartPolicy: OnFailure
  containers:
    - name: inference
      image: nvcr.io/nvidia/tritonserver:23.12-py3
      resources:
        limits:
          nvidia.com/mig-1g.10gb: 1    # Request one 1g.10gb MIG slice

---
# Example: Pod requesting a larger MIG instance for training
apiVersion: v1
kind: Pod
metadata:
  name: mig-training-medium
  namespace: default
  labels:
    app: mig-test
spec:
  restartPolicy: OnFailure
  containers:
    - name: training
      image: nvcr.io/nvidia/pytorch:23.12-py3
      command: ["python", "-c", "import torch; print(torch.cuda.get_device_properties(0))"]
      resources:
        limits:
          nvidia.com/mig-3g.40gb: 1    # Request one 3g.40gb MIG slice

---
# ResourceQuota for MIG resources in a shared namespace
apiVersion: v1
kind: ResourceQuota
metadata:
  name: mig-quota
  namespace: default
spec:
  hard:
    requests.nvidia.com/mig-1g.10gb: "4"
    requests.nvidia.com/mig-2g.20gb: "2"
    requests.nvidia.com/mig-3g.40gb: "1"

---
# Job to verify MIG configuration on a node
apiVersion: batch/v1
kind: Job
metadata:
  name: mig-verify
  namespace: default
spec:
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: mig-check
          image: nvcr.io/nvidia/cuda:12.3.1-base-ubuntu22.04
          command:
            - bash
            - -c
            - |
              echo "=== GPU Information ==="
              nvidia-smi
              echo ""
              echo "=== MIG Devices ==="
              nvidia-smi mig -lgip
              echo ""
              echo "=== MIG Instances ==="
              nvidia-smi mig -lgi
          resources:
            limits:
              nvidia.com/mig-1g.10gb: 1
